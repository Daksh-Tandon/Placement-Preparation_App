<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register Page</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#eef2ff,#dbeafe);

    font-family:'Segoe UI',sans-serif;
    padding:20px;
}

/* Form Container */
.container{
    width:100%;
    max-width:450px;

    background:white;

    padding:35px 30px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* Heading */
.container h1{
    text-align:center;
    color:#1e293b;
    margin-bottom:25px;
}

/* Form */
.register-form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* Inputs */
.register-form input{
    width:100%;

    padding:14px;

    border:1px solid #cbd5e1;
    border-radius:10px;

    font-size:15px;

    outline:none;
    transition:0.3s;
}

.register-form input:focus{
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,0.2);
}

/* Button */
.sub{
    width:100%;

    padding:14px;

    border:none;
    border-radius:10px;

    background:#2563eb;
    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;
    transition:0.3s;
}

.sub:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* Tablet */
@media(max-width:768px){

    .container{
        max-width:400px;
    }
}

/* Mobile */
@media(max-width:480px){

    .container{
        padding:25px 20px;
    }

    .container h1{
        font-size:1.6rem;
    }

    .register-form input,
    .sub{
        padding:12px;
        font-size:14px;
    }
}


</style>
</head>
<body>
<div class="container">
<h1>Register Form</h1>

<form action="register" method="post" class="register-form">
 <input type="text" placeholder="Enter Your Name" name="name" required>
<input type="password" placeholder="Set a Password" name="password" required>

<input type="email" placeholder="Enter Email" name="email" required>

<button class="sub">Submit</button>
</form>
</div>


</body>
</html>
