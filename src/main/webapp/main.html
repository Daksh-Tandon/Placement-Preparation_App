<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Page</title>
<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #eef2f3, #dfe9f3);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Header */
.header {
    width: 100%;
    padding: 20px;
    background-color: #007BFF;
    color: white;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.header h1 {
    font-size: 28px;
}

/* Form Container */
form {
    margin-top: 50px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 90%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

textarea {
    width: 100%;
    height: 140px;
    padding: 12px;
    font-size: 16px;
    font-family: Arial, sans-serif;

    border: 2px solid #ccc;
    border-radius: 10px;

    outline: none;
    resize: none;

    transition: 0.3s ease;
}


textarea:focus {
    border-color: #007BFF;
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.3);
}


textarea::placeholder {
    color: #888;
    font-style: italic;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;

    background-color: #007BFF;
    color: white;

    cursor: pointer;
    transition: 0.3s;
}


button:hover {
    background-color: #0056b3;
    transform: scale(1.05);
}


</style>
</head>
<body>
<div class="header">
<h1>Welcome To Admin Page</h1>
</div>
<form action="admin" method="post">
<textarea name="text" placeholder="Send a Message To All Registered Candidates"></textarea>
<button>Submit</button>

</form>
<div class="change tasks"></div>


</body>
</html>
