<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SignIn Page</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#eef2ff,#dbeafe);

    font-family:'Segoe UI',sans-serif;
    padding:20px;
}

.Sign{
    width:100%;
    max-width:400px;

    background:#fff;

    padding:35px 30px;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.Sign h1{
    text-align:center;
    margin-bottom:25px;

    color:#1e293b;
}

form{
    display:flex;
    flex-direction:column;
    gap:18px;
}

input{
    width:100%;

    padding:14px;

    border:1px solid #cbd5e1;
    border-radius:10px;

    font-size:15px;

    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,0.2);
}

.but{
    padding:14px;

    border:none;
    border-radius:10px;

    background:#2563eb;
    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;
    transition:.3s;
}

.but:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* Mobile */
@media(max-width:480px){

    .Sign{
        padding:25px 20px;
    }

    .Sign h1{
        font-size:1.6rem;
    }

    input,
    .but{
        font-size:14px;
        padding:12px;
    }
}
</style>
</head>
<body>
<div class="Sign">
<h1>Signin-Form</h1>
<form action="signin" method="post">
 <input type="text" placeholder="Enter Your Name" name="name" required> 

<input type="password" placeholder="Enter your Password" name="password" required>
<button class="but">Submit</button>
</form>


</div>

</body>
</html>
